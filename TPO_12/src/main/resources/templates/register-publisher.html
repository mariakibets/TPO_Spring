<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register Publisher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-5">
    <h2>Register as Publisher</h2>
    <form th:action="@{/register/publisher}" th:object="${userDto}" method="post">

            <label for="username" class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-control" id="username" required />

            <label for="email" class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" id="email" required />


            <label for="publisherName" class="form-label">Publisher Name</label>
            <input type="text" th:field="*{publisherName}" class="form-control" id="publisherName" required />

            <label for="password" class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" id="password" required />

            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" id="confirmPassword" required />

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>
</body>
</html>
