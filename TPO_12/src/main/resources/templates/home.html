<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-4">Library Book List</h1>

<form th:action="@{/search}" method="get" class="mb-3">
    <div class="input-group">
        <input type="text" name="keyword" class="form-control" placeholder="Search books...">
        <button class="btn btn-primary" type="submit">Search</button>
    </div>
</form>

<div class="row">
    <div th:each="book : ${books}" class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title" th:text="${book.title}">Book Title</h5>
                <p class="card-text" th:text="${book.author}">Author</p>
                <p class="card-text"><small th:text="${book.publisher.name}">Publisher</small></p>
            </div>
        </div>
    </div>
</div>

<div>
    <a class="btn btn-primary me-2" th:href="@{/register/reader}">Register as Reader</a>
    <a class="btn btn-secondary" th:href="@{/register/publisher}">Register as Publisher</a>
</div>

<hr/>

<div>
    <a th:href="@{/login}">Login</a>
</div>

</body>
</html>
