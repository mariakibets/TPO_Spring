<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Role Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>🔐 Role Management</h2>

<table class="table table-bordered mt-4">
    <thead>
    <tr>
        <th>Username</th>
        <th>Current Roles</th>
        <th>Assign New Role</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.username}">Username</td>
        <td>
            <ul>
                <li th:each="r : ${user.roles}" th:text="${r.name}">Role</li>
            </ul>
        </td>
        <td>
            <form th:action="@{/users/admin/assign-role}" method="post" class="d-flex">
                <input type="hidden" name="userId" th:value="${user.id}"/>
                <select class="form-select me-2" name="roleName">
                    <option th:each="r : ${roles}" th:value="${r.name}" th:text="${r.name}">Role</option>
                </select>
                <button class="btn btn-primary" type="submit">Assign</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
