<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Link</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Access Link</h2>
<form th:action="@{/access}" th:object="${linkRequest}" method="post">

        <label>Name</label>
        <input type="text" th:field="*{name}" class="form-control"/>
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></p>

        <label>Password</label>
        <input type="password" th:field="*{password}" class="form-control"/>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></p>

    <p class="text-danger" th:if="${error}" th:text="${error}"></p>

    <button type="submit" class="btn btn-primary">Access</button>

</form>
</body>
</html>
