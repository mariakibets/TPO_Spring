<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Link</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Create New Link</h2>
<form th:action="@{/create}" th:object="${linkRequest}" method="post">

<label>Name</label>
     <input type="text" th:field="*{name}" class="form-control"/>
       <p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

        <label>Target URL</label>
        <input type="text" th:field="*{targetUrl}" class="form-control"/>
        <p class="text-danger" th:if="${#fields.hasErrors('targetUrl')}" th:errors="*{targetUrl}"></p>

        <label>Password (optional)</label>
        <input type="password" th:field="*{password}" class="form-control"/>
        <p class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

    <p class="text-danger" th:if="${error}" th:text="${error}"></p>

    <button type="submit" class="btn btn-primary">Create Link</button>
</form>
</body>
</html>
