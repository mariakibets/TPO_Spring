<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Converter</title>
</head>
<body>
<h1>Base Converter</h1>
<form action="/convert-base" method="post">
    <label>Value: <input type="text" name="value" required></label><br><br>
    <label>From Base (2-94): <input type="number" name="fromBase" min="2" max="94" required></label><br><br>
    <label>To Base (2-94): <input type="number" name="toBase" min="2" max="94" required></label><br><br>
    <button type="submit">Convert</button>
</form>
</body>
</html>
